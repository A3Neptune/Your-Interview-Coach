<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>You're offline — Your Interview Coach</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #F8F6F1;
      font-family: 'DM Sans', system-ui, -apple-system, sans-serif;
      color: #0f172a;
      padding: 24px;
    }

    .card {
      text-align: center;
      max-width: 420px;
      width: 100%;
      background: rgba(255,255,255,0.80);
      border: 1px solid rgba(37,99,235,0.12);
      border-radius: 24px;
      padding: 48px 36px;
      box-shadow: 0 8px 40px rgba(37,99,235,0.08);
      backdrop-filter: blur(12px);
    }

    .icon {
      width: 64px;
      height: 64px;
      margin: 0 auto 24px;
      background: rgba(37,99,235,0.08);
      border-radius: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    h1 {
      font-size: 26px;
      font-weight: 700;
      letter-spacing: -0.03em;
      margin-bottom: 10px;
    }

    p {
      font-size: 15px;
      color: #64748b;
      line-height: 1.65;
      margin-bottom: 28px;
    }

    button {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 12px 26px;
      background: linear-gradient(135deg, #2563eb, #1d4ed8);
      color: #fff;
      font-size: 14px;
      font-weight: 600;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      box-shadow: 0 6px 20px rgba(37,99,235,0.30);
      font-family: inherit;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }

    button:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 28px rgba(37,99,235,0.40);
    }
  </style>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;600;700&display=swap" rel="stylesheet" />
</head>
<body>
  <div class="card">
    <div class="icon">
      <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="#2563eb" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <line x1="1" y1="1" x2="23" y2="23"/>
        <path d="M16.72 11.06A10.94 10.94 0 0 1 19 12.55"/>
        <path d="M5 12.55a10.94 10.94 0 0 1 5.17-2.39"/>
        <path d="M10.71 5.05A16 16 0 0 1 22.56 9"/>
        <path d="M1.42 9a15.91 15.91 0 0 1 4.7-2.88"/>
        <path d="M8.53 16.11a6 6 0 0 1 6.95 0"/>
        <line x1="12" y1="20" x2="12.01" y2="20"/>
      </svg>
    </div>
    <h1>You're offline</h1>
    <p>It looks like you've lost your internet connection. Check your network and try again.</p>
    <button onclick="location.reload()">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="23 4 23 10 17 10"/>
        <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/>
      </svg>
      Try again
    </button>
  </div>
</body>
</html>
